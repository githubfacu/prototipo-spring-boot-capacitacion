
spring.application.name=tienda-demo
spring.application.description=tienda-demo-escuela-it
spring.application.language=es
spring.application.version=1.0

implementation.people=default

spring.datasource.platform=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/tienda
spring.datasource.username=postgres
spring.datasource.password=mysecret12

spring.datasource.initialization-mode=always
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
server.error.include-message=always